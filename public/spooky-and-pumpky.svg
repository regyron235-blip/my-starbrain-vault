<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6a88;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#grad)" rx="15"/>
  <!-- Spooky (Ghost) -->
  <path d="M 70 50 Q 60 60 60 80 Q 60 100 70 110 L 70 70 Z" fill="#fff" filter="url(#shadow)"/>
  <circle cx="65" cy="85" r="4" fill="#000"/>
  <!-- Pumpky (Pumpkin) -->
  <circle cx="130" cy="85" r="20" fill="#ff8c00" filter="url(#shadow)"/>
  <!-- Pumpkin segments -->
  <path d="M 130 65 Q 135 75 130 95" stroke="#ff6b35" stroke-width="2" fill="none"/>
  <path d="M 130 65 Q 125 75 130 95" stroke="#ff6b35" stroke-width="2" fill="none"/>
  <!-- Pumpkin face -->
  <circle cx="125" cy="80" r="2" fill="#000"/>
  <circle cx="135" cy="80" r="2" fill="#000"/>
  <path d="M 125 90 L 135 90" stroke="#000" stroke-width="2"/>
  <!-- Text -->
  <text x="100" y="165" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Spooky & Pumpky</text>
</svg>
