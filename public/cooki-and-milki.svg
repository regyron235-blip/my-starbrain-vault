<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#grad)" rx="15"/>
  <!-- Cooki (Cookie) -->
  <circle cx="75" cy="75" r="22" fill="#d2691e" filter="url(#shadow)"/>
  <!-- Chocolate chips on Cooki -->
  <circle cx="65" cy="65" r="3" fill="#3d2817"/>
  <circle cx="80" cy="70" r="3" fill="#3d2817"/>
  <circle cx="75" cy="85" r="3" fill="#3d2817"/>
  <!-- Milki (Milk glass) -->
  <rect x="100" y="65" width="22" height="35" rx="3" fill="#f5f5f5" filter="url(#shadow)"/>
  <rect x="100" y="75" width="22" height="20" fill="#fffacd" opacity="0.8"/>
  <!-- Milk wave -->
  <path d="M 100 74 Q 105 70 110 74 T 120 74" stroke="#fff" stroke-width="1" fill="none"/>
  <!-- Text -->
  <text x="100" y="165" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Cooki & Milki</text>
</svg>
