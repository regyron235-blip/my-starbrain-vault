<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#grad)" rx="15"/>
  <!-- Multiple candies -->
  <!-- Candy 1 (Lollipop) -->
  <circle cx="60" cy="70" r="15" fill="#ff1493" filter="url(#shadow)"/>
  <rect x="57" y="85" width="6" height="25" fill="#8b4513"/>
  <!-- Candy 2 (Round) -->
  <circle cx="100" cy="55" r="18" fill="#ffd700" filter="url(#shadow)"/>
  <!-- Candy 3 (Wrapped) -->
  <rect x="130" y="75" width="20" height="20" fill="#ff69b4" filter="url(#shadow)" rx="3"/>
  <path d="M 140 65 L 140 95" stroke="#ff1493" stroke-width="2"/>
  <!-- Sparkles -->
  <circle cx="75" cy="45" r="2" fill="#fff"/>
  <circle cx="120" cy="40" r="2" fill="#fff"/>
  <circle cx="155" cy="60" r="2" fill="#fff"/>
  <!-- Text -->
  <text x="100" y="165" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Los Candies</text>
</svg>
